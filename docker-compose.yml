services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_NAME=asistencia_db
      - DB_USER=asistencia_user
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENV=docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - config_data:/var/www/html/config
      - foto_data:/var/www/html/foto_perfil
      - tmp_data:/var/www/html/tmp
    restart: unless-stopped

  db:
    image: mysql:8.0.30
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=asistencia_db
      - MYSQL_USER=asistencia_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups/asistencia_db.sql:/docker-entrypoint-initdb.d/asistencia.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  config_data:
  foto_data:
  tmp_data:
